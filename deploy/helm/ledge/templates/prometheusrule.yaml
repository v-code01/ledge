{{- if .Values.metrics.prometheusRule.enabled }}
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: {{ include "ledge.fullname" . }}
  labels:
    {{- include "ledge.labels" . | nindent 4 }}
    {{- with .Values.metrics.prometheusRule.labels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  # Embeds the canonical rules (files/ledge-alerts.yml) verbatim — the same file
  # the standalone Prometheus stack and the CI regression test consume, so the
  # alerts cannot drift between Helm and Compose.
{{ .Files.Get "files/ledge-alerts.yml" | indent 2 }}
{{- end }}
