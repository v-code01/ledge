apiVersion: v1
kind: Service
metadata:
  name: {{ include "ledge.headless" . }}
  labels:
    {{- include "ledge.labels" . | nindent 4 }}
spec:
  clusterIP: None
  publishNotReadyAddresses: true
  selector:
    {{- include "ledge.selectorLabels" . | nindent 4 }}
  ports:
    # client carries git/REST/RPC (+ /healthz + /metrics back-compat) AND peer
    # /raft (no separate raft listener). Peer DNS (ledge-N.headless) resolves here
    # for Raft. metrics is the dedicated plain scrape port; peer is published under mTLS.
    - name: client
      port: {{ .Values.service.port }}
      targetPort: client
    {{- if .Values.metrics.enabled }}
    - name: metrics
      port: {{ .Values.metrics.port }}
      targetPort: metrics
    {{- end }}
    {{- if and .Values.tls.enabled .Values.tls.mtls }}
    - name: peer
      port: {{ .Values.tls.peerPort }}
      targetPort: peer
    {{- end }}
