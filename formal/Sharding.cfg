\* TLC configuration for the Ledge Phase 3 Sharding spec (clean instance).
\*
\* Instance: Refs = {r1, r2, r3}, NumShards = 2, Objects = {o1, o2}, a 4-op
\* shared committed log, correct routing (BadRouting = FALSE).  The operational
\* determinism model has a tiny state graph (two applied-counters in 0..4 plus
\* the derived state), exhaustively checked in well under a minute.

SPECIFICATION Spec

CONSTANTS
    Refs = {"r1", "r2", "r3"}
    NumShards = 2
    Objects = {"o1", "o2"}
    NONE = NONE
    BadRouting = FALSE
    Hash  <- HashDef
    OpLog <- OpLogDef

INVARIANT TypeOK
INVARIANT RoutingTotality
INVARIANT Partition
INVARIANT DeterminismInv
INVARIANT PrefixFunctional
