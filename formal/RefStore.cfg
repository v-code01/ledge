\* TLC model-check configuration for the Ledge ref store.
\* Small finite instance: 2 refs, 2 object ids, 2 concurrent writers,
\* per-ref version bounded at 2. Exhaustive BFS (~1.1M distinct states,
\* depth 12) finishes in ~50s -- well under a minute.
\*
\* This instance fully exercises the CAS protocol: create-if-absent,
\* conflicting CAS (expected mismatch), gen-races between the two writers
\* (RetryCAS), and the +1 version progression (1 -> 2) per ref. Larger
\* object/version bounds add only target-choice/log-length multiplicity,
\* not new protocol behaviours, while exploding the state graph past the
\* sub-minute budget.

CONSTANTS
    RefNames  = {r1, r2}
    ObjectIds = {o1, o2}
    Writers   = {w1, w2}
    MaxVersion = 2
    NONE = NONE

INIT Init
NEXT Next

CONSTRAINT StateConstraint

INVARIANT TypeOK
INVARIANT MonotonicVersion
INVARIANT HLCMonotonic
INVARIANT NoLostUpdate
INVARIANT SnapshotIsolation
