\* TLC model-check configuration for the Ledge ref store.
\* Small finite instance: 1 ref, 2 object ids, 2 concurrent writers,
\* per-ref version bounded at 2. Exhaustive BFS finishes well under a minute.
\*
\* Adding the Delete flow (a ref can go absent then be recreated, restarting
\* its version at 1), the NotFoundAbort branch, and the richer snapshot record
\* (frozen map + independent live witnesses) expands the per-ref state graph
\* substantially. With the original 2-ref instance the graph exceeds the
\* sub-minute budget (>6.5M distinct states and climbing past 5 min), so the
\* instance is reduced to a SINGLE ref name. One ref with two concurrent
\* writers still fully exercises every protocol behaviour we model:
\*   - create-if-absent (expected = NONE on an absent ref)
\*   - update CAS (expected = matching ObjectId)
\*   - conflicting CAS  -> ConflictAbort   (present, wrong target)
\*   - absent + concrete-expected -> NotFoundAbort (the NotFound branch)
\*   - delete (expected = current target) -> ref := NONE
\*   - recreate after delete (version restarts at 1)
\*   - gen-races between the two writers -> RetryCAS
\*   - the +1 version progression (1 -> 2) and its reset across a delete
\*   - snapshot isolation across both update and delete commits
\* A second ref name adds only independent-namespace multiplicity (the refs
\* do not interact: CAS is on the whole root, but safety per ref is the same),
\* not new protocol behaviour, while multiplying the state graph past budget.

CONSTANTS
    RefNames  = {r1}
    ObjectIds = {o1, o2}
    Writers   = {w1, w2}
    MaxVersion = 2
    NONE = NONE

INIT Init
NEXT Next

CONSTRAINT StateConstraint

INVARIANT TypeOK
INVARIANT MonotonicVersion
INVARIANT HLCMonotonic
INVARIANT NoLostUpdate
INVARIANT SnapshotIsolation
