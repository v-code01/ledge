\* NEGATIVE CONTROL for CrossShardTxn: BadCoord = TRUE enables BadCommit, a
\* faulty coordinator that rolls a ref FORWARD (commit-prepared) with NO durable
\* Commit decision -- exactly the violation the real protocol forbids by writing
\* the durable TxnDecide BEFORE any CommitPrepared (and by the resolver never
\* rolling forward without a durable Commit).  With it enabled a ref becomes
\* "committed" while the decision is still "none" (NoDirtyRead fires) and a split
\* (one ref committed, a sibling aborted) becomes reachable (Atomicity fires).
\*
\* Checked by `make neg-txn`, which asserts TLC EXITS NON-ZERO.  Never in the
\* default `make check` loop -- it is DESIGNED to fail.  Only safety invariants
\* are listed (no PROPERTY): we want the violating finite-state counterexample,
\* not a liveness behaviour.

SPECIFICATION Spec

CHECK_DEADLOCK FALSE

CONSTANTS
    Txns = {"t1", "t2"}
    Refs = {"rA", "rS", "rB"}
    BadCoord = TRUE
    Writes <- WritesDef

INVARIANT TypeOK
INVARIANT Atomicity
INVARIANT NoDirtyRead
