\* TLC config for the Ledge Phase 4c DistributedGc spec (clean instance).
\* 2 objects (chain o1->o2), 2 nodes, 2 shards, both nodes host both shards
\* (co-hosting -- the condition prepared-pinning must survive). BadGc = FALSE:
\* correct GC marks committed UNION prepared. The state graph is bounded
\* (2^|Objects| per per-node/per-shard set x phases) and exhaustively checked
\* in seconds.

\* The model TERMINATES: a behaviour can reach a state where every object is
\* committed and every node's GC is idle, leaving no enabled action. That is
\* correct completion, not a stuck deadlock (same as the 4b CrossShardTxn
\* model), so disable TLC's default deadlock-on-terminal-state check.
CHECK_DEADLOCK FALSE

CONSTANTS
    Objects = {"o1", "o2"}
    Nodes = {"n1", "n2"}
    Shards = {"s1", "s2"}
    reach <- ReachDef
    Hosts <- HostsDef
    BadGc = FALSE

INIT Init
NEXT Next

INVARIANT TypeOK
INVARIANT NoLiveObjectDeleted
INVARIANT MarkCoversHostedClosure
INVARIANT PreparedPinned
