\* TLC config for the Ledge Phase 4b CrossShardTxn 2PC spec (clean instance).
\*
\* Two transactions over three refs, CONTENDING on the shared ref rS:
\*   t1 writes {rA, rS}   t2 writes {rS, rB}   (both cross-shard, both want rS)
\* so exactly one txn can lock rS; the other votes NO (no-wait) and aborts
\* cleanly -- the cross-shard contention case.  Correct coordinator
\* (BadCoord = FALSE).  The reachable state graph is small (per-txn 4-state
\* phase x tristate decision x bool coordUp, per-ref tristate vote + holder +
\* per-(ref,txn) tristate applied) and is exhaustively checked in seconds,
\* including all crash + presumed-abort + roll-forward interleavings.

SPECIFICATION Spec

\* The protocol TERMINATES: every behaviour ends in a state where both txns are
\* `done` (committed or aborted, all refs resolved) with no enabled action.  That
\* is correct completion, not a stuck deadlock, so disable TLC's default
\* deadlock-on-terminal-state check.  (True protocol deadlock-freedom is asserted
\* by the NoDeadlock invariant, which has teeth: the no-wait PrepareNo escape.)
CHECK_DEADLOCK FALSE

CONSTANTS
    Txns = {"t1", "t2"}
    Refs = {"rA", "rS", "rB"}
    BadCoord = FALSE
    Writes <- WritesDef

INVARIANT TypeOK
INVARIANT Atomicity
INVARIANT NoDirtyRead
INVARIANT NoDeadlock
INVARIANT NoDoubleCommitOfRef
INVARIANT DecisionStable

PROPERTY DecisionDurability
