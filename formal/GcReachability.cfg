\* TLC model-check configuration for the Phase 2a GC candidate-set guard.
\* 4 objects with reachability chain o1 -> o2 -> o3, plus isolated o4.
\* Naturally finite (state graph bounded by 2^|Objects| x phases); the
\* exhaustive check finishes in well under a second.

CONSTANTS
    Objects = {"o1", "o2", "o3", "o4"}
    reach <- ReachDef

INIT Init
NEXT Next

INVARIANT TypeOK
INVARIANT GCSafety
INVARIANT MarkCoversLiveClosure
INVARIANT NoLiveRootDangling
