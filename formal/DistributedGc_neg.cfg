\* NEGATIVE CONTROL for DistributedGc: BadGc = TRUE drops preparedRoots from
\* frozenRoots (marks only committed refs, ignoring in-flight 2PC intents). A
\* Prepare(s,o) then stages o with no committed referrer; a co-hosting node's GC
\* sweeps o; a later CommitPrepared(s,o) leaves a committed root pointing at a
\* deleted object -- violating PreparedPinned (and NoLiveObjectDeleted). Checked
\* by `make neg-gc`, which asserts TLC EXITS NON-ZERO. Never in `make check`.

CHECK_DEADLOCK FALSE

CONSTANTS
    Objects = {"o1", "o2"}
    Nodes = {"n1", "n2"}
    Shards = {"s1", "s2"}
    reach <- ReachDef
    Hosts <- HostsDef
    BadGc = TRUE

INIT Init
NEXT Next

INVARIANT TypeOK
INVARIANT NoLiveObjectDeleted
INVARIANT PreparedPinned
