\* TLC configuration: NEGATIVE CONTROL for the Sharding spec.
\*
\* Identical to Sharding.cfg EXCEPT BadRouting = TRUE.  BadRouting makes the
\* routing relation double-assign the first ref (by hash) to two shards, so
\* its routing image is no longer a singleton.  This MUST fire a violation of
\* RoutingTotality (single-assignment clause) and of Partition (disjointness).
\* It is checked by `make neg`, which asserts TLC EXITS NON-ZERO.  Never put
\* this config in the default `make check` loop -- it is designed to fail.

SPECIFICATION Spec

CONSTANTS
    Refs = {"r1", "r2", "r3"}
    NumShards = 2
    Objects = {"o1", "o2"}
    NONE = NONE
    BadRouting = TRUE
    Hash  <- HashDef
    OpLog <- OpLogDef

INVARIANT TypeOK
INVARIANT RoutingTotality
INVARIANT Partition
INVARIANT DeterminismInv
INVARIANT PrefixFunctional
