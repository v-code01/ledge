[build]
rustflags = ["-C", "target-cpu=native"]

[alias]
t  = "test --workspace"
b  = "build --workspace"
cl = "clippy --workspace -- -D warnings"

[target.x86_64-unknown-linux-gnu]
rustflags = ["-C", "target-cpu=native", "-C", "link-arg=-fuse-ld=lld"]

[target.aarch64-apple-darwin]
rustflags = ["-C", "target-cpu=native"]
